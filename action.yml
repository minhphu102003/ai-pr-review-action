name: 'AI PR Review'
description: 'AI-powered PR review with anti-hallucination rules, severity callouts, and Mermaid diagrams. Supports OpenCode and direct LLM APIs (OpenAI, Anthropic).'
author: 'minhphu102003'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  engine:
    description: 'LLM engine to use: opencode or direct'
    required: false
    default: 'opencode'
  model:
    description: 'Model name (e.g. opencode/mimo-v2.5-free, gpt-4.1-mini, claude-haiku-4-5-20251001)'
    required: false
    default: ''
  opencode_api_key:
    description: 'API key for OpenCode engine'
    required: false
    default: ''
  openai_api_key:
    description: 'OpenAI API key (for direct engine)'
    required: false
    default: ''
  openai_base_url:
    description: 'Custom base URL for OpenAI-compatible API (e.g. https://openrouter.ai/api/v1, http://localhost:11434/v1)'
    required: false
    default: ''
  anthropic_api_key:
    description: 'Anthropic API key (for direct engine)'
    required: false
    default: ''
  anthropic_base_url:
    description: 'Custom base URL for Anthropic-compatible API'
    required: false
    default: ''
  github_token:
    description: 'GitHub token for posting review comments'
    required: true
    default: ${{ github.token }}
  prompt_file:
    description: 'Path to custom prompt file in your repo (overrides built-in prompt)'
    required: false
    default: ''
  exclude:
    description: 'Glob patterns to exclude from review (comma-separated)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Validate engine input
      if: inputs.engine != 'opencode' && inputs.engine != 'direct'
      shell: bash
      run: |
        echo "::error::Invalid engine '${{ inputs.engine }}'. Must be 'opencode' or 'direct'."
        exit 1

    - id: resolve-prompt
      shell: bash
      env:
        INPUT_PROMPT_FILE: ${{ inputs.prompt_file }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        PROMPT_PATH=""
        if [ -n "$INPUT_PROMPT_FILE" ] && [ -f "$INPUT_PROMPT_FILE" ]; then
          PROMPT_PATH="$INPUT_PROMPT_FILE"
          echo "Using custom prompt: $PROMPT_PATH"
        elif [ -f ".github/prompts/review.txt" ]; then
          PROMPT_PATH=".github/prompts/review.txt"
          echo "Using repo prompt: $PROMPT_PATH"
        else
          PROMPT_PATH="$ACTION_PATH/prompts/review.txt"
          echo "Using built-in prompt: $PROMPT_PATH"
        fi
        {
          echo 'PROMPT<<ghadelim_8f3a2b1c'
          cat "$PROMPT_PATH"
          echo 'ghadelim_8f3a2b1c'
        } >> "$GITHUB_OUTPUT"

    # Engine: OpenCode (default)
    - name: Review with OpenCode
      if: inputs.engine == 'opencode'
      uses: anomalyco/opencode/github@latest
      env:
        OPENCODE_API_KEY: ${{ inputs.opencode_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      with:
        model: ${{ inputs.model || 'opencode/mimo-v2.5-free' }}
        use_github_token: true
        prompt: ${{ steps.resolve-prompt.outputs.PROMPT }}

    # Engine: Direct LLM API (OpenAI or Anthropic)
    - name: Review with direct LLM API
      if: inputs.engine == 'direct'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        OPENAI_BASE_URL: ${{ inputs.openai_base_url }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic_base_url }}
        MODEL: ${{ inputs.model }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        EXCLUDE: ${{ inputs.exclude }}
        PROMPT: ${{ steps.resolve-prompt.outputs.PROMPT }}
      run: python3 "$ACTION_PATH/scripts/review_direct.py"
