name: 'Synaptic PR Review'
description: 'Free AI PR review using OpenCode free model. Anti-hallucination rules, severity callouts, Mermaid diagrams.'
author: 'minhphu102003'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  engine:
    description: 'LLM engine to use: opencode or direct'
    required: false
    default: 'opencode'
  model:
    description: 'Model name (e.g. opencode/mimo-v2.5-free, gpt-4.1-mini, claude-haiku-4-5-20251001)'
    required: false
    default: ''
  opencode_api_key:
    description: 'API key for OpenCode engine. Store as GitHub secret, do not hardcode.'
    required: false
    default: ''
  openai_api_key:
    description: 'OpenAI API key (for direct engine). Store as GitHub secret, do not hardcode.'
    required: false
    default: ''
  openai_base_url:
    description: 'Custom base URL for OpenAI-compatible API (e.g. https://openrouter.ai/api/v1, http://localhost:11434/v1)'
    required: false
    default: ''
  anthropic_api_key:
    description: 'Anthropic API key (for direct engine). Store as GitHub secret, do not hardcode.'
    required: false
    default: ''
  anthropic_base_url:
    description: 'Custom base URL for Anthropic-compatible API'
    required: false
    default: ''
  github_token:
    description: 'GitHub token for posting review comments'
    required: true
    default: ${{ github.token }}
  prompt_file:
    description: 'Path to custom prompt file in your repo (overrides built-in prompt)'
    required: false
    default: ''
  exclude:
    description: 'Glob patterns to exclude from review (comma-separated)'
    required: false
    default: ''
  context_files:
    description: 'Comma-separated list of files to include as context for the review (e.g. docs/architecture.md,CLAUDE.md). Auto-detects if empty.'
    required: false
    default: ''
  update_comment:
    description: 'Update existing review comment instead of creating a new one'
    required: false
    default: 'true'
  share:
    description: 'Share OpenCode session link in PR comment (opencode engine only)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Validate engine input
      if: inputs.engine != 'opencode' && inputs.engine != 'direct'
      shell: bash
      env:
        INPUT_ENGINE: ${{ inputs.engine }}
      run: |
        echo "::error::Invalid engine '$INPUT_ENGINE'. Must be 'opencode' or 'direct'."
        exit 1

    - id: resolve-prompt
      shell: bash
      env:
        INPUT_PROMPT_FILE: ${{ inputs.prompt_file }}
        ACTION_PATH: ${{ github.action_path }}
        RUN_ID: ${{ github.run_id }}
      run: |
        PROMPT_PATH=""
        if [ -n "$INPUT_PROMPT_FILE" ] && [ -f "$INPUT_PROMPT_FILE" ]; then
          # Validate file extension
          case "$INPUT_PROMPT_FILE" in
            *.txt|*.md|*.prompt) ;;
            *)
              echo "::warning::Prompt file '$INPUT_PROMPT_FILE' has unusual extension. Expected .txt, .md, or .prompt."
              ;;
          esac
          PROMPT_PATH="$INPUT_PROMPT_FILE"
          echo "Using custom prompt: $PROMPT_PATH"
        elif [ -f ".github/prompts/review.txt" ]; then
          PROMPT_PATH=".github/prompts/review.txt"
          echo "Using repo prompt: $PROMPT_PATH"
        else
          PROMPT_PATH="$ACTION_PATH/prompts/review.txt"
          echo "Using built-in prompt: $PROMPT_PATH"
        fi
        # Validate prompt size (GitHub Actions env var limit ~48KB)
        PROMPT_SIZE=$(wc -c < "$PROMPT_PATH")
        if [ "$PROMPT_SIZE" -gt 32768 ]; then
          echo "::warning::Prompt is ${PROMPT_SIZE} bytes (>${ 32768 } byte limit recommended). May exceed GitHub Actions env var limits."
        fi
        DELIMITER="ghadelim_${RUN_ID}"
        {
          echo "PROMPT<<${DELIMITER}"
          cat "$PROMPT_PATH"
          echo "${DELIMITER}"
        } >> "$GITHUB_OUTPUT"

    # Fetch context files for OpenCode engine (with diff size check)
    - id: resolve-context
      if: inputs.engine == 'opencode'
      shell: bash
      env:
        INPUT_CONTEXT_FILES: ${{ inputs.context_files }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        EVENT_PATH: ${{ github.event_path }}
      run: |
        # Check diff size before fetching context
        PR_NUMBER=$(jq -r '.pull_request.number // .issue.number' "$EVENT_PATH")
        DIFF_SIZE=$(curl -sfL -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3.diff" \
          "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" 2>/dev/null | wc -c)
        echo "Diff size: $DIFF_SIZE chars"

        # Only fetch context if diff < 70K chars
        if [ "$DIFF_SIZE" -ge 70000 ]; then
          echo "Diff too large ($DIFF_SIZE chars), skipping context files."
          exit 0
        fi

        CONTEXT=""
        if [ -n "$INPUT_CONTEXT_FILES" ]; then
          IFS=',' read -ra FILES <<< "$INPUT_CONTEXT_FILES"
        else
          FILES=("CLAUDE.md" "AGENTS.md" "SOUL.md" "MEMORY.md" "docs/architecture.md" "docs/ARCHITECTURE.md" "ARCHITECTURE.md")
        fi
        TOTAL=0
        MAX=15000
        for f in "${FILES[@]}"; do
          f=$(echo "$f" | xargs)  # trim whitespace
          [ -z "$f" ] && continue
          [ $TOTAL -ge $MAX ] && break
          CONTENT=$(curl -sfL -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/$REPO/contents/$f" 2>/dev/null || true)
          if [ -z "$CONTENT" ]; then
            # Only warn for user-specified paths
            if [ -n "$INPUT_CONTEXT_FILES" ]; then
              echo "::warning::Context file not found: $f"
            fi
            continue
          fi
          REMAINING=$((MAX - TOTAL))
          if [ ${#CONTENT} -gt $REMAINING ]; then
            CONTENT="${CONTENT:0:$REMAINING}"
          fi
          CONTEXT="${CONTEXT}--- ${f} ---
        ${CONTENT}

        "
          TOTAL=$((TOTAL + ${#CONTENT}))
        done
        if [ -n "$CONTEXT" ]; then
          echo "Context files: $TOTAL chars"
        fi
        DELIMITER="ghadelim_${RUN_ID}"
        if [ -n "$CONTEXT" ]; then
          {
            echo "CONTEXT<<${DELIMITER}"
            echo "<context>"
            echo "$CONTEXT"
            echo "</context>"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"
        fi

    # Fetch unresolved review threads for context and auto-reply (OpenCode engine)
    - id: resolve-review-context
      if: inputs.engine == 'opencode'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        EVENT_PATH: ${{ github.event_path }}
      run: |
        PR_NUMBER=$(jq -r '.pull_request.number // .issue.number' "$EVENT_PATH")
        REVIEW_CTX=$(python3 "$ACTION_PATH/scripts/review_context.py" \
          --owner "${REPO%%/*}" --repo "${REPO##*/}" \
          --pr "$PR_NUMBER" --mode context 2>/dev/null || true)
        REPLY_CTX=$(python3 "$ACTION_PATH/scripts/review_context.py" \
          --owner "${REPO%%/*}" --repo "${REPO##*/}" \
          --pr "$PR_NUMBER" --mode replies 2>/dev/null || true)
        DELIMITER="ghadelim_${RUN_ID}"
        {
          echo "REVIEW_CONTEXT<<${DELIMITER}"
          echo "${REVIEW_CTX}${REPLY_CTX}"
          echo "${DELIMITER}"
        } >> "$GITHUB_OUTPUT"
        if [ -n "$REVIEW_CTX" ]; then
          echo "Review context fetched"
        fi

    # Engine: OpenCode (default)
    - name: Review with OpenCode
      if: inputs.engine == 'opencode'
      uses: anomalyco/opencode/github@v1.17.12
      env:
        OPENCODE_API_KEY: ${{ inputs.opencode_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      with:
        model: ${{ inputs.model || 'opencode/mimo-v2.5-free' }}
        use_github_token: true
        prompt: ${{ steps.resolve-context.outputs.CONTEXT }}${{ steps.resolve-review-context.outputs.REVIEW_CONTEXT }}${{ steps.resolve-prompt.outputs.PROMPT }}
        share: ${{ inputs.share }}

    # Post inline comments for OpenCode engine
    - name: Post inline review comments
      if: inputs.engine == 'opencode'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: python3 "$ACTION_PATH/scripts/post_inline.py"

    # Engine: Direct LLM API (OpenAI or Anthropic)
    - name: Review with direct LLM API
      if: inputs.engine == 'direct'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        OPENAI_BASE_URL: ${{ inputs.openai_base_url }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic_base_url }}
        MODEL: ${{ inputs.model }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        EXCLUDE: ${{ inputs.exclude }}
        CONTEXT_FILES: ${{ inputs.context_files }}
        UPDATE_COMMENT: ${{ inputs.update_comment }}
        PROMPT: ${{ steps.resolve-prompt.outputs.PROMPT }}
      run: python3 "$ACTION_PATH/scripts/review_direct.py"
